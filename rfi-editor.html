<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RFI Editor — ESPACIOCORP</title>
<style>
:root {
  --primary: #5B2E8F;
  --primary-dark: #3D1A6E;
  --primary-light: #7C4DB2;
  --bg: #F6F3FA;
  --white: #fff;
  --border: #d8d0e6;
  --text: #1a1a2e;
  --muted: #6b5f7a;
  --danger: #e74c3c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, Helvetica, sans-serif; font-size: 13px; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Header */
.app-header { background: var(--primary); color: white; padding: 10px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.app-header img { height: 44px; filter: brightness(0) invert(1); }
.app-header h1 { font-size: 15px; font-weight: bold; letter-spacing: 0.5px; }
.app-header .subtitle { font-size: 11px; opacity: 0.8; }

/* Split screen */
.app-body { display: flex; flex: 1; overflow: hidden; min-height: 0; }

/* Left panel */
.left-panel { flex: 1; min-width: 0; display: flex; flex-direction: column; border-right: 3px solid var(--primary); background: #e8e3f0; overflow: hidden; }
.panel-header { background: var(--primary-dark); color: white; padding: 8px 16px; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1.5px; flex-shrink: 0; }
.preview-scroll { flex: 1; overflow: auto; padding: 20px; }
#preview-frame { display: block; width: 1060px; min-height: 1300px; border: none; background: white; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }

/* Right panel */
.right-panel { width: 430px; min-width: 380px; display: flex; flex-direction: column; background: var(--white); overflow: hidden; }
.form-scroll { flex: 1; overflow-y: auto; padding: 12px; }

/* Accordion */
.section { border: 1px solid var(--border); border-radius: 6px; margin-bottom: 10px; overflow: hidden; }
.section-header { background: var(--primary); color: white; padding: 9px 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: bold; letter-spacing: 0.5px; user-select: none; }
.section-header:hover { background: var(--primary-light); }
.section-header .chevron { transition: transform 0.2s; }
.section-header.open .chevron { transform: rotate(180deg); }
.section-body { padding: 12px; display: none; background: #faf9fc; }
.section-body.open { display: block; }

/* Fields */
.field { margin-bottom: 10px; }
.field label { display: block; font-size: 10px; font-weight: bold; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 3px; }
.field input[type="text"], .field input[type="email"], .field input[type="date"], .field textarea {
  width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 12px; font-family: Arial, Helvetica, sans-serif; background: white; transition: border-color 0.15s;
}
.field input:focus, .field textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(91,46,143,0.12); }
.field textarea { resize: vertical; min-height: 58px; }

.subsection-title { font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin: 10px 0 6px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }

/* Array inputs */
.array-container { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 4px; }
.array-item { display: flex; align-items: flex-start; gap: 6px; padding: 5px 8px; border-bottom: 1px solid #f0ecf8; background: white; }
.array-item:last-child { border-bottom: none; }
.array-item textarea, .array-item input { flex: 1; padding: 4px 6px; border: 1px solid #e0d8ed; border-radius: 3px; font-size: 12px; font-family: Arial; }
.array-item textarea { resize: vertical; }
.btn-remove { background: var(--danger); color: white; border: none; border-radius: 3px; padding: 3px 7px; cursor: pointer; font-size: 11px; flex-shrink: 0; }
.btn-remove:hover { opacity: 0.85; }
.btn-add { background: var(--primary-light); color: white; border: none; border-radius: 4px; padding: 5px 10px; cursor: pointer; font-size: 11px; font-weight: bold; margin-top: 5px; }
.btn-add:hover { background: var(--primary); }

/* Item editor */
.item-editor { border: 1px solid var(--border); border-radius: 5px; margin-bottom: 8px; overflow: hidden; }
.item-editor-header { background: #ede8f5; padding: 7px 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
.item-editor-header:hover { background: #e0d8f0; }
.item-editor-title { font-weight: bold; font-size: 12px; color: var(--primary-dark); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 6px; }
.item-editor-body { padding: 10px; display: none; background: white; }
.item-editor-body.open { display: block; }

/* Subitem editor */
.subitem-editor { border: 1px solid #e0d8ed; border-radius: 4px; margin-bottom: 6px; overflow: hidden; background: #faf8ff; }
.subitem-editor-header { background: #f0eaf8; padding: 5px 8px; display: flex; align-items: center; gap: 6px; }
.subitem-editor-header input { flex: 1; padding: 3px 6px; border: 1px solid #d0c8e8; border-radius: 3px; font-size: 12px; font-weight: bold; font-family: Arial; }
.subitem-editor-body { padding: 8px; }
.subsub-container { border: 1px solid #e8e0f5; border-radius: 3px; overflow: hidden; }
.subsub-item { display: flex; gap: 5px; align-items: center; padding: 4px 6px; border-bottom: 1px solid #f0ecf8; }
.subsub-item:last-child { border-bottom: none; }
.subsub-item input { flex: 1; padding: 3px 5px; border: 1px solid #d8d0ea; border-radius: 3px; font-size: 11px; font-family: Arial; }

/* Actions */
.actions-bar { padding: 10px 12px; border-top: 2px solid var(--primary); display: flex; gap: 8px; background: var(--white); flex-shrink: 0; }
.btn-primary { background: var(--primary); color: white; border: none; border-radius: 5px; padding: 8px 16px; cursor: pointer; font-size: 12px; font-weight: bold; font-family: Arial; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-secondary { background: white; color: var(--primary); border: 2px solid var(--primary); border-radius: 5px; padding: 7px 14px; cursor: pointer; font-size: 12px; font-family: Arial; }
.btn-secondary:hover { background: var(--bg); }

/* ── Login ───────────────────────────────────────────────────────────────── */
.login-screen { position: fixed; inset: 0; background: linear-gradient(150deg, #2A0F50 0%, #5B2E8F 55%, #8B55CC 100%); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.login-card { background: white; border-radius: 16px; padding: 44px 40px 36px; width: 360px; box-shadow: 0 28px 72px rgba(0,0,0,0.5); text-align: center; }
.login-logo { height: 58px; margin-bottom: 26px; }
.login-title { font-size: 21px; font-weight: bold; color: var(--primary); margin-bottom: 3px; letter-spacing: 0.2px; }
.login-tagline { font-size: 10px; color: #aaa; margin-bottom: 0; letter-spacing: 2px; text-transform: uppercase; }
.login-divider { border: none; border-top: 1px solid #ede8f5; margin: 22px 0 20px; }
.login-field { margin-bottom: 14px; text-align: left; }
.login-field label { display: block; font-size: 10px; font-weight: bold; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
.login-field input { width: 100%; padding: 10px 13px; border: 1.5px solid var(--border); border-radius: 7px; font-size: 13px; font-family: Arial; box-sizing: border-box; transition: border-color 0.15s, box-shadow 0.15s; }
.login-field input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(91,46,143,0.13); }
.login-error { color: #c0392b; font-size: 12px; text-align: center; margin-bottom: 8px; min-height: 16px; font-weight: bold; }
.login-btn { width: 100%; background: var(--primary); color: white; border: none; border-radius: 8px; padding: 12px; font-size: 14px; font-weight: bold; font-family: Arial; cursor: pointer; letter-spacing: 0.5px; margin-top: 4px; transition: background 0.15s, transform 0.1s; }
.login-btn:hover { background: var(--primary-dark); }
.login-btn:active { transform: scale(0.98); }
.login-footer { margin-top: 24px; font-size: 9px; color: #c8b8e0; letter-spacing: 2.5px; text-transform: uppercase; }
#app { display: none; height: 100vh; flex-direction: column; overflow: hidden; }
#app.visible { display: flex; }
@keyframes shake {
  0%,100%{ transform: translateX(0); }
  20%    { transform: translateX(-10px); }
  40%    { transform: translateX(10px); }
  60%    { transform: translateX(-7px); }
  80%    { transform: translateX(7px); }
}
</style>
</head>
<body>

<!-- ── Pantalla de ingreso ─────────────────────────────────────────────── -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <img id="login-logo" src="img/LOGO_ECORP.png" class="login-logo" alt="ESPACIOCORP">
    <div class="login-title">RFI Editor</div>
    <div class="login-tagline">Hacemos que suceda</div>
    <hr class="login-divider">
    <form id="login-form" onsubmit="return doLogin(event)">
      <div class="login-field">
        <label>Usuario / User</label>
        <input type="text" id="login-user" placeholder="Ingresa tu usuario" autocomplete="username" autofocus>
      </div>
      <div class="login-field">
        <label>Contraseña / Password</label>
        <input type="password" id="login-pass" placeholder="Ingresa tu contraseña" autocomplete="current-password">
      </div>
      <div id="login-error" class="login-error"></div>
      <button type="submit" class="login-btn">Ingresar</button>
    </form>
    <div class="login-footer">ESPACIOCORP &nbsp;·&nbsp; Administración de Contrato</div>
  </div>
</div>

<!-- ── Aplicación principal ────────────────────────────────────────────── -->
<div id="app">

<header class="app-header">
  <img id="header-logo" src="img/LOGO_ECORP.png" alt="ESPACIOCORP">
  <div>
    <h1>RFI Editor</h1>
    <div class="subtitle">Request for Information — ESPACIOCORP</div>
  </div>
</header>

<div class="app-body">
  <div class="left-panel">
    <div class="panel-header">Vista Previa / Preview</div>
    <div class="preview-scroll">
      <iframe id="preview-frame" title="RFI Preview"></iframe>
    </div>
  </div>
  <div class="right-panel">
    <div class="panel-header">Datos del RFI / RFI Data</div>
    <div class="form-scroll" id="form-container"></div>
    <div class="actions-bar">
      <button class="btn-primary" onclick="exportHTML()">&#8595; Exportar HTML</button>
      <button class="btn-primary" onclick="exportPDF()" style="background:#8B1A1A">&#8595; Exportar PDF</button>
      <button class="btn-secondary" onclick="exportJSON()">&#8595; Exportar JSON</button>
      <button class="btn-secondary" onclick="resetData()" style="margin-left:auto">&#8635; Reiniciar</button>
    </div>
  </div>
</div>

</div><!-- #app -->

<script>
// ── Login ─────────────────────────────────────────────────────────────────────
function doLogin(e) {
  e.preventDefault();
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  if (user === 'momo' && pass === 'Momo123') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    buildForm();
    updatePreview();
  } else {
    const err = document.getElementById('login-error');
    err.textContent = 'Usuario o contraseña incorrectos';
    document.getElementById('login-pass').value = '';
    document.getElementById('login-pass').focus();
    // Sacudir la tarjeta
    const card = document.querySelector('.login-card');
    card.style.animation = 'none';
    card.offsetHeight;
    card.style.animation = 'shake 0.4s ease';
  }
  return false;
}

function generateRFIHtml(d) {
  const p = d.project;

  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  // Use raw string for content that may contain intentional HTML (mark tags)
  function raw(s) { return s == null ? '' : String(s); }

  function renderCc(cc) {
    if (!cc || !cc.length) return '';
    return '<ul class="subsub-list">' + cc.map(c => '<li>' + esc(c.name) + ' (' + esc(c.email) + ')</li>').join('') + '</ul>';
  }

  function renderRefDocs(refs) {
    if (!refs || !refs.length) return '';
    return refs.map(r => '<li>' + raw(r) + '</li>').join('');
  }

  function renderSubitems(subitems) {
    if (!subitems || !subitems.length) return '';
    const items = subitems.map(sub => {
      if (typeof sub === 'string') return '<li>' + raw(sub) + '</li>';
      const ssHtml = sub.subsubitems && sub.subsubitems.length
        ? '<ol class="nivel3">' + sub.subsubitems.map(s => '<li>' + raw(s) + '</li>').join('') + '</ol>'
        : '';
      return '<li><strong>' + esc(sub.name) + '</strong>' + (sub.description ? ': ' + raw(sub.description) : '') + ssHtml + '</li>';
    }).join('');
    return '<ol class="nivel2">' + items + '</ol>';
  }

  function renderItems(items) {
    if (!items || !items.length) return '';
    return items.map((item, i) => {
      const subs = item.subitems || item.subsubitems || [];
      return '<tr class="item-row keep-together"><td class="desc-cell"><div class="item-block">' +
        '<div class="item-title">' + (i+1) + '. <strong>' + esc(item.title) + '</strong></div>' +
        (item.description ? '<div class="description">' + raw(item.description) + '</div>' : '') +
        renderSubitems(subs) +
        '</div></td></tr>';
    }).join('');
  }

  function renderDocs(docs) {
    if (!docs || !docs.length) return '';
    return '<ul class="subsub-list">' + docs.map(d => '<li>' + esc(d) + '</li>').join('') + '</ul>';
  }

  const logoPath = LOGO_B64;

// ── Preview ───────────────────────────────────────────────────────────────────
let previewTimer = null;
function updatePreview() {
  clearTimeout(previewTimer);
  previewTimer = setTimeout(() => {
    document.getElementById('preview-frame').srcdoc = generateRFIHtml(rfiData);
  }, 150);
}

// ── DOM helpers ───────────────────────────────────────────────────────────────
function mk(tag, cls) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}

function field(labelText, inputEl) {
  const wrap = mk('div', 'field');
  const lbl = mk('label');
  lbl.textContent = labelText;
  wrap.appendChild(lbl);
  wrap.appendChild(inputEl);
  return wrap;
}

function inp(val, cb, type) {
  const el = mk('input');
  el.type = type || 'text';
  el.value = val || '';
  el.addEventListener('input', () => { cb(el.value); updatePreview(); });
  return el;
}

function ta(val, cb, rows) {
  const el = mk('textarea');
  el.rows = rows || 3;
  el.value = val || '';
  el.addEventListener('input', () => { cb(el.value); updatePreview(); });
  return el;
}

function subTitle(text) {
  const d = mk('div', 'subsection-title');
  d.textContent = text;
  return d;
}

function section(title, id, builder, open) {
  const sec = mk('div', 'section');
  const hdr = mk('div', 'section-header' + (open ? ' open' : ''));
  hdr.innerHTML = title + ' <span class="chevron">&#9660;</span>';
  const body = mk('div', 'section-body' + (open ? ' open' : ''));
  body.id = id;
  hdr.addEventListener('click', () => {
    const isOpen = body.classList.toggle('open');
    hdr.classList.toggle('open', isOpen);
  });
  builder(body);
  sec.appendChild(hdr);
  sec.appendChild(body);
  return sec;
}

function addBtn(label, onClick) {
  const b = mk('button', 'btn-add');
  b.textContent = label;
  b.addEventListener('click', onClick);
  return b;
}

function removeBtn(onClick) {
  const b = mk('button', 'btn-remove');
  b.textContent = '✕';
  b.addEventListener('click', onClick);
  return b;
}

// ── Array builders ────────────────────────────────────────────────────────────
function buildCcArray(container, cc) {
  container.innerHTML = '';
  const wrap = mk('div', 'array-container');
  cc.forEach((item, i) => {
    const row = mk('div', 'array-item');
    row.style.flexDirection = 'column';
    const top = mk('div');
    top.style.cssText = 'display:flex;gap:6px;width:100%';
    const ni = mk('input'); ni.type='text'; ni.placeholder='Nombre'; ni.value=item.name||'';
    ni.style.cssText='flex:1;padding:4px 6px;border:1px solid #e0d8ed;border-radius:3px;font-size:12px;font-family:Arial';
    ni.addEventListener('input', () => { cc[i].name = ni.value; updatePreview(); });
    const ei = mk('input'); ei.type='email'; ei.placeholder='Email'; ei.value=item.email||'';
    ei.style.cssText='flex:1;padding:4px 6px;border:1px solid #e0d8ed;border-radius:3px;font-size:12px;font-family:Arial';
    ei.addEventListener('input', () => { cc[i].email = ei.value; updatePreview(); });
    const rb = removeBtn(() => { cc.splice(i,1); buildCcArray(container,cc); updatePreview(); });
    top.append(ni, ei, rb);
    row.appendChild(top);
    wrap.appendChild(row);
  });
  container.appendChild(wrap);
  container.appendChild(addBtn('+ Agregar Cc', () => { cc.push({name:'',email:''}); buildCcArray(container,cc); updatePreview(); }));
}

function buildStringArray(container, arr, multiline) {
  container.innerHTML = '';
  const wrap = mk('div', 'array-container');
  arr.forEach((val, i) => {
    const row = mk('div', 'array-item');
    let el;
    if (multiline) {
      el = mk('textarea'); el.rows=2; el.value=val||'';
      el.style.cssText='flex:1;padding:4px 6px;border:1px solid #e0d8ed;border-radius:3px;font-size:11px;font-family:Arial;resize:vertical';
    } else {
      el = mk('input'); el.type='text'; el.value=val||'';
      el.style.cssText='flex:1;padding:4px 6px;border:1px solid #e0d8ed;border-radius:3px;font-size:12px;font-family:Arial';
    }
    el.addEventListener('input', () => { arr[i]=el.value; updatePreview(); });
    const rb = removeBtn(() => { arr.splice(i,1); buildStringArray(container,arr,multiline); updatePreview(); });
    row.append(el, rb);
    wrap.appendChild(row);
  });
  container.appendChild(wrap);
  container.appendChild(addBtn('+ Agregar', () => { arr.push(''); buildStringArray(container,arr,multiline); updatePreview(); }));
}

function buildDocsArray(container, arr) {
  container.innerHTML = '';
  const wrap = mk('div', 'array-container');
  arr.forEach((val,i) => {
    const row = mk('div', 'array-item');
    const el = mk('input'); el.type='text'; el.value=val||'';
    el.style.cssText='flex:1;padding:4px 6px;border:1px solid #e0d8ed;border-radius:3px;font-size:12px;font-family:Arial';
    el.addEventListener('input', () => { arr[i]=el.value; updatePreview(); });
    const rb = removeBtn(() => { arr.splice(i,1); buildDocsArray(container,arr); updatePreview(); });
    row.append(el, rb);
    wrap.appendChild(row);
  });
  container.appendChild(wrap);
  container.appendChild(addBtn('+ Agregar documento', () => { arr.push(''); buildDocsArray(container,arr); updatePreview(); }));
}

// ── RFI Item editor ───────────────────────────────────────────────────────────
function buildItemEditor(container, items) {
  container.innerHTML = '';

  items.forEach((item, idx) => {
    const editor = mk('div', 'item-editor');
    const hdr = mk('div', 'item-editor-header');
    const titleSpan = mk('span', 'item-editor-title');
    titleSpan.textContent = (idx+1) + '. ' + (item.title || '(sin título)');
    const chev = mk('span'); chev.textContent='▼'; chev.style.cssText='font-size:10px;transition:transform 0.2s;flex-shrink:0';
    const rb = removeBtn(e => {
      e.stopPropagation();
      items.splice(idx,1); buildItemEditor(container,items); updatePreview();
    });
    rb.style.cssText='margin-left:8px;font-size:10px;padding:2px 6px;flex-shrink:0';

    const body = mk('div', 'item-editor-body');
    hdr.addEventListener('click', () => {
      body.classList.toggle('open');
      chev.style.transform = body.classList.contains('open') ? 'rotate(180deg)' : '';
    });
    hdr.append(titleSpan, chev, rb);

    // Title
    const titleInp = inp(item.title, v => {
      item.title = v;
      titleSpan.textContent = (idx+1) + '. ' + (v || '(sin título)');
    });
    body.appendChild(field('Título / Title', titleInp));

    // Description
    body.appendChild(field('Descripción / Description', ta(item.description, v => item.description = v, 2)));

    // Subitems
    const subArr = item.subitems || (item.subsubitems ? (item.subitems = item.subsubitems, delete item.subsubitems, item.subitems) : null);
    if (subArr !== null && subArr !== undefined) {
      body.appendChild(subTitle('Sub-ítems'));
      const subCont = mk('div');
      body.appendChild(subCont);
      buildSubitemsEditor(subCont, subArr);
    } else {
      const noBtn = addBtn('+ Agregar sub-ítems', () => {
        item.subitems = [''];
        buildItemEditor(container, items);
        updatePreview();
      });
      noBtn.style.marginTop='6px';
      body.appendChild(noBtn);
    }

    editor.append(hdr, body);
    container.appendChild(editor);
  });

  const addItemBtn = addBtn('+ Agregar ítem RFI', () => {
    items.push({ title: 'Nuevo ítem', description: '', subitems: [] });
    buildItemEditor(container, items);
    updatePreview();
  });
  addItemBtn.style.cssText='margin-top:8px;width:100%;text-align:center;display:block';
  container.appendChild(addItemBtn);
}

function buildSubitemsEditor(container, arr) {
  container.innerHTML = '';
  const wrap = mk('div', 'array-container');

  arr.forEach((sub, si) => {
    if (typeof sub === 'string') {
      const row = mk('div', 'array-item');
      const el = mk('textarea'); el.rows=2; el.value=sub||'';
      el.style.cssText='flex:1;padding:4px 6px;border:1px solid #e0d8ed;border-radius:3px;font-size:11px;font-family:Arial;resize:vertical';
      el.addEventListener('input', () => { arr[si]=el.value; updatePreview(); });
      const rb = removeBtn(() => { arr.splice(si,1); buildSubitemsEditor(container,arr); updatePreview(); });
      rb.style.padding='2px 6px';
      row.append(el, rb);
      wrap.appendChild(row);
    } else {
      // Named subitem
      const sed = mk('div', 'subitem-editor');
      const shdr = mk('div', 'subitem-editor-header');
      const ni = mk('input'); ni.type='text'; ni.placeholder='Nombre del sub-ítem'; ni.value=sub.name||'';
      ni.style.cssText='flex:1;padding:3px 6px;border:1px solid #d0c8e8;border-radius:3px;font-size:12px;font-weight:bold;font-family:Arial';
      ni.addEventListener('input', () => { sub.name=ni.value; updatePreview(); });
      const rb = removeBtn(() => { arr.splice(si,1); buildSubitemsEditor(container,arr); updatePreview(); });
      rb.style.padding='2px 6px';
      shdr.append(ni, rb);

      const sbody = mk('div', 'subitem-editor-body');
      const descTa = mk('textarea'); descTa.rows=2; descTa.placeholder='Descripción'; descTa.value=sub.description||'';
      descTa.style.cssText='width:100%;padding:4px 6px;border:1px solid #d0c8e8;border-radius:3px;font-size:11px;font-family:Arial;resize:vertical;margin-bottom:6px;box-sizing:border-box';
      descTa.addEventListener('input', () => { sub.description=descTa.value; updatePreview(); });
      sbody.appendChild(descTa);

      const ssTitle = mk('div');
      ssTitle.textContent='Sub-sub-ítems:';
      ssTitle.style.cssText='font-size:10px;font-weight:bold;color:#6b5f7a;margin-bottom:4px';
      sbody.appendChild(ssTitle);

      const ssCont = mk('div');
      sbody.appendChild(ssCont);

      function buildSS() {
        ssCont.innerHTML='';
        if (!sub.subsubitems) sub.subsubitems=[];
        const ssWrap = mk('div', 'subsub-container');
        sub.subsubitems.forEach((ss,ssi) => {
          const row = mk('div', 'subsub-item');
          const el = mk('input'); el.type='text'; el.value=ss||'';
          el.addEventListener('input', () => { sub.subsubitems[ssi]=el.value; updatePreview(); });
          const rb = removeBtn(() => { sub.subsubitems.splice(ssi,1); buildSS(); updatePreview(); });
          rb.style.cssText='padding:2px 5px;font-size:10px';
          row.append(el, rb);
          ssWrap.appendChild(row);
        });
        ssCont.appendChild(ssWrap);
        const ssAdd = addBtn('+ Sub-sub-ítem', () => { sub.subsubitems.push(''); buildSS(); updatePreview(); });
        ssAdd.style.cssText='font-size:10px;padding:3px 8px;margin-top:4px';
        ssCont.appendChild(ssAdd);
      }
      buildSS();

      sed.append(shdr, sbody);
      wrap.appendChild(sed);
    }
  });

  container.appendChild(wrap);

  const btnRow = mk('div'); btnRow.style.cssText='display:flex;gap:6px;margin-top:5px';
  const addSimple = addBtn('+ Sub-ítem texto', () => { arr.push(''); buildSubitemsEditor(container,arr); updatePreview(); });
  const addNamed = addBtn('+ Sub-ítem con nombre', () => { arr.push({name:'',description:'',subsubitems:[]}); buildSubitemsEditor(container,arr); updatePreview(); });
  btnRow.append(addSimple, addNamed);
  container.appendChild(btnRow);
}

    body.appendChild(field('N° Propuesta / Proposal No', inp(d.project.proposal_no, v => d.project.proposal_no=v)));

    const lbl = mk('label'); lbl.textContent='Acompaña documentos / Includes documents';
    const cbLabel = mk('label');
    cbLabel.style.cssText='display:flex;align-items:center;gap:6px;font-size:12px;color:#1a1a2e;font-weight:normal;text-transform:none;letter-spacing:0';
    const cb = mk('input'); cb.type='checkbox'; cb.checked=!!d.attachments.includes_documents; cb.style.width='auto';
    cb.addEventListener('change', () => { d.attachments.includes_documents=cb.checked; updatePreview(); });
    cbLabel.append(cb, document.createTextNode('Sí / Yes'));
    cbWrap.append(lbl, cbLabel);
    body.appendChild(cbWrap);
    body.appendChild(subTitle('Documentos adjuntos'));
    if (!d.attachments.documents) d.attachments.documents=[];
    const docsCont = mk('div');
    body.appendChild(docsCont);
    buildDocsArray(docsCont, d.attachments.documents);
  }));

  // 6. Fechas
  container.appendChild(section('6. Fechas / Dates', 'sec-fechas', body => {
    body.appendChild(field('Fecha Emisión / Origin Date', inp(d.dates.origin_date, v => d.dates.origin_date=v, 'date')));
    body.appendChild(field('Fecha Respuesta / Answer Date', inp(d.dates.answer_date, v => d.dates.answer_date=v, 'date')));
    body.appendChild(field('Fecha Devolución / Return Date', inp(d.dates.return_date, v => d.dates.return_date=v, 'date')));
  }));

  // 7. Firmas
  container.appendChild(section('7. Firmas / Signatures', 'sec-firmas', body => {
    body.appendChild(subTitle('Originador / Originator'));
    body.appendChild(field('Nombre / Name', inp(d.signatures.originator.name, v => d.signatures.originator.name=v)));
    body.appendChild(field('Cargo / Job Title', inp(d.signatures.originator.job_title, v => d.signatures.originator.job_title=v)));
    body.appendChild(subTitle('Recibido por / Received by'));
    body.appendChild(field('Nombre / Name', inp(d.signatures.received_by.name, v => d.signatures.received_by.name=v)));
    body.appendChild(field('Cargo / Job Title', inp(d.signatures.received_by.job_title, v => d.signatures.received_by.job_title=v)));
    body.appendChild(field('Fecha / Date', inp(d.signatures.received_by.date, v => d.signatures.received_by.date=v, 'date')));
    body.appendChild(subTitle('Respondido por / Answer by'));
    body.appendChild(field('Nombre / Name', inp(d.signatures.answer_by.name, v => d.signatures.answer_by.name=v)));
    body.appendChild(field('Cargo / Job Title', inp(d.signatures.answer_by.job_title, v => d.signatures.answer_by.job_title=v)));
  }));

  // 8. Respuesta
  container.appendChild(section('8. Respuesta / Answer', 'sec-respuesta', body => {
    body.appendChild(field('Texto de respuesta / Answer text', ta(d.answer.text, v => d.answer.text=v, 5)));
  }));

  // 9. Metadatos
  container.appendChild(section('9. Metadatos / Metadata', 'sec-meta', body => {
    body.appendChild(field('Fecha Revisión / Revision Date', inp(d.metadata.revision_date, v => d.metadata.revision_date=v)));
    body.appendChild(field('Área / Area', inp(d.metadata.area, v => d.metadata.area=v)));
    body.appendChild(field('Etiqueta / File Label', inp(d.metadata.file_label, v => d.metadata.file_label=v)));
    body.appendChild(field('Página / Page (ej: 1 of 1)', inp(d.metadata.page, v => d.metadata.page=v)));
  }));
}

// ── Export ────────────────────────────────────────────────────────────────────
function exportPDF() {
  const p = rfiData.project;
  const filename = p.project_no + '-RFI-' + p.rfi_no;

  // Generar HTML base y agregar @page + auto-print
  let html = generateRFIHtml(rfiData);

  // Inyectar @page para tamaño oficio y márgenes correctos
  html = html.replace(
    '@media print{',
    '@page{size:legal portrait;margin:12mm 8mm;}@media print{'
  );

  // Inyectar script de auto-print y title para el nombre del archivo PDF
  html = html.replace(
    '</body>',
    '<script>document.title=' + JSON.stringify(filename) + ';window.onload=function(){setTimeout(window.print,400);}<\/script></body>'
  );

  const win = window.open('', '_blank');
  if (!win) {
    alert('Activa las ventanas emergentes (pop-ups) en tu navegador para exportar PDF.');
    return;
  }
  win.document.write(html);
  win.document.close();
}

function exportHTML() {
  const html = generateRFIHtml(rfiData);
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.download = rfiData.project.project_no + '-RFI-' + rfiData.project.rfi_no + '.html';
  a.href = url; a.click();
  URL.revokeObjectURL(url);
}

function exportJSON() {
  const json = JSON.stringify(rfiData, null, 2);
  const blob = new Blob([json], { type: 'application/json;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.download = rfiData.project.project_no + '-RFI-' + rfiData.project.rfi_no + '.json';
  a.href = url; a.click();
  URL.revokeObjectURL(url);
}

function resetData() {
  if (!confirm('¿Reiniciar todos los datos al estado inicial?')) return;
  rfiData = JSON.parse(JSON.stringify(initialData));
  buildForm();
  updatePreview();
}
